---
name: PR Issue Detector & Fixer
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  detect-issues:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    outputs:
      issues_found: ${{ steps.detect.outputs.issues_found }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Detect issues
        id: detect
        run: |
          ISSUES=""
          for workflow in .github/workflows/*.yml; do
            if [ -f "$workflow" ]; then
              job_names=$(grep -oP '^\s+\w+:\s*$' "$workflow" | tr -d ' :' | grep -v "^$" | head -20)
              for job_name in $job_names; do
                if [[ "$job_name" == "needs" || "$job_name" == "if" || "$job_name" == "runs-on" || "$job_name" == "environment" || "$job_name" == "timeout-minutes" || "$job_name" == "continue-on-error" ]]; then
                  continue
                fi
                job_start=$(grep -n "^  $job_name:" "$workflow" | head -1 | cut -d: -f1)
                if [ -n "$job_start" ]; then
                  if ! sed -n "${job_start},$((job_start + 3))p" "$workflow" | grep -q "permissions:"; then
                    if [ -n "$ISSUES" ]; then
                      ISSUES+="\n"
                    fi
                    ISSUES+="• Job '$job_name' in '$(basename $workflow)' is missing explicit permissions"
                  fi
                fi
              done
            fi
          done

          if [ -z "$ISSUES" ]; then
            echo "issues_found=false" >> $GITHUB_OUTPUT
          else
            echo "issues_found=true" >> $GITHUB_OUTPUT
            echo "$ISSUES" > /tmp/issues.txt
          fi

      - name: Comment issues on PR
        if: steps.detect.outputs.issues_found == 'true'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          ISSUES=$(cat /tmp/issues.txt)
          echo "## PR Analysis" > /tmp/body.txt
          echo "" >> /tmp/body.txt
          echo "I found the following issues in this PR:" >> /tmp/body.txt
          echo "" >> /tmp/body.txt
          echo "$ISSUES" >> /tmp/body.txt
          echo "" >> /tmp/body.txt
          echo "### Available Fix Commands" >> /tmp/body.txt
          echo "" >> /tmp/body.txt
          echo "To fix these issues, comment with:" >> /tmp/body.txt
          echo "- /fix-workflow-permissions - Fix missing permissions" >> /tmp/body.txt
          echo "- /fix precommit - Fix pre-commit issues" >> /tmp/body.txt
          echo "- /fix all - Apply all fixes" >> /tmp/body.txt
          gh pr comment $PR_NUM --body-file /tmp/body.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  apply-fixes:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/fix')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml pre-commit

      - name: Create fix script
        run: |
          echo "" | base64 -d > /tmp/fix_permissions.py
          chmod +x /tmp/fix_permissions.py

      - name: Apply workflow permissions fix
        if: contains(github.event.comment.body, 'fix-workflow-permissions') || contains(github.event.comment.body, 'fix all')
        run: python3 /tmp/fix_permissions.py

      - name: Apply pre-commit fixes
        if: contains(github.event.comment.body, 'fix precommit') || contains(github.event.comment.body, 'fix all')
        run: pre-commit run --all-files || true

      - name: Commit and push
        id: commit
        run: |
          if git diff --exit-code --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git add -A
            git commit -m "style: auto-fix PR issues"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment results
        if: steps.commit.outputs.changed == 'true'
        run: |
          PR_NUM=$(echo "${{ github.event.comment.issue_url }}" | grep -oP '\d+$')
          echo "## Fix Applied" > /tmp/body.txt
          echo "" >> /tmp/body.txt
          echo "Fixed:" >> /tmp/body.txt
          echo "- Added missing permissions to workflow jobs" >> /tmp/body.txt
          echo "- Applied pre-commit auto-fixes" >> /tmp/body.txt
          echo "" >> /tmp/body.txt
          echo "Changes have been pushed to this PR." >> /tmp/body.txt
          gh pr comment $PR_NUM --body-file /tmp/body.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
